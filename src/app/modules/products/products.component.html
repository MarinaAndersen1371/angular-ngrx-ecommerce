<div class="row justify-content-center" *ngIf="vm$ |async as vm">
  <div *ngIf="user$ | async as user">
    <div class="col-12 mt-4">
      <h4><strong>Products</strong></h4>
      <div class="row">
        <div class="col-lg-4 col-md-6 mt-3" *ngFor="let product of vm.products">
          <div class="card">
            <img src="{{product.imageUrl}}" class="card-img-top" alt="Product Image">
            <div class="card-body">
              <h6 class="card-title">{{product.name}}</h6>
              <p class="card-text">Price : {{product.price?.toLocaleString('de-DE', {style: 'currency', currency:
                'EUR'})
                || ''}}
              </p>
              <p class="card-text">Quantity : {{product.quantity}}</p>
            </div>
            <div class="text-center mb-1">
              <div class="btn-group" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-info" [routerLink]="['/shopping/product-view', product._id]"
                  title="View Product Details">
                  <fa-icon [icon]="faSearch"></fa-icon> View
                </button>

                <button *ngIf="user.isLoggedin" type="button" class="btn btn-success"
                  [routerLink]="['/auth/usercart', user._id]" title="View Cart">
                  <fa-icon [icon]="faCartPlus"></fa-icon> Cart
                </button>
                <button *ngIf="!user.isLoggedin" type="button" class="btn btn-success" [routerLink]="['/auth/login']"
                  title="View Cart">
                  <fa-icon [icon]="faCartPlus"></fa-icon> Cart
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
